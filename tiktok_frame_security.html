<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  color: #f1f5f9;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(239,68,68,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(239,68,68,0.06) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}
.glow {
  position: absolute;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(239,68,68,0.2) 0%, transparent 70%);
  top: -200px;
  left: -200px;
  pointer-events: none;
}
.glow2 {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,158,11,0.15) 0%, transparent 70%);
  bottom: -100px;
  right: -100px;
  pointer-events: none;
}
.content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 80px;
}
.badge {
  display: inline-block;
  background: linear-gradient(135deg, #ef4444, #f97316);
  color: white;
  font-size: 28px;
  font-weight: 800;
  padding: 10px 32px;
  border-radius: 50px;
  margin-bottom: 40px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
h1 {
  font-size: 90px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 30px;
  background: linear-gradient(135deg, #f1f5f9 0%, #ef4444 50%, #f59e0b 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  font-size: 42px;
  color: #94a3b8;
  font-weight: 500;
  margin-bottom: 60px;
}
.check-list {
  text-align: left;
  margin-bottom: 60px;
}
.check-item {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 30px;
  font-size: 36px;
  color: #e2e8f0;
}
.check-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  background: rgba(16, 185, 129, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.score-circle {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  background: conic-gradient(#10b981 270deg, #334155 0);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 40px;
  position: relative;
}
.score-circle::before {
  content: '';
  position: absolute;
  width: 220px;
  height: 220px;
  background: #0f172a;
  border-radius: 50%;
}
.score-value {
  position: relative;
  font-size: 80px;
  font-weight: 900;
  color: #10b981;
}
.cta-box {
  background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(245,158,11,0.15));
  border: 2px solid rgba(239,68,68,0.4);
  border-radius: 32px;
  padding: 50px;
}
.cta-text {
  font-size: 40px;
  font-weight: 700;
  margin-bottom: 20px;
}
.url {
  font-size: 36px;
  color: #f59e0b;
  font-weight: 600;
  font-family: 'Courier New', monospace;
}
.footer {
  position: absolute;
  bottom: 60px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 2;
}
.footer-logo {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #ef4444, #f59e0b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  
  <div class="content">
    <div class="badge">🛡️ Gratuit</div>
    
    <h1>Security Audit<br>Pro Tool</h1>
    <p class="subtitle">20+ verificări de securitate în 30 secunde</p>
    
    <div class="check-list">
      <div class="check-item">
        <div class="check-icon">✓</div>
        <span>DNSSEC & SSL Certificate</span>
      </div>
      <div class="check-item">
        <div class="check-icon">✓</div>
        <span>Email Spoofing Test</span>
      </div>
      <div class="check-item">
        <div class="check-icon">✓</div>
        <span>Subdomain Enumeration</span>
      </div>
      <div class="check-item">
        <div class="check-icon">✓</div>
        <span>Security Headers Analysis</span>
      </div>
    </div>
    
    <div class="score-circle">
      <div class="score-value">85</div>
    </div>
    
    <div class="cta-box">
      <div class="cta-text">🔗 Testează-ți site-ul acum</div>
      <div class="url">previous-genres-consulting-outer.trycloudflare.com</div>
    </div>
  </div>
  
  <div class="footer">
    <div class="footer-logo">ESDUM IT CONSULTING</div>
  </div>
</body>
</html>
