<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1920px;
  background: linear-gradient(180deg, #f5f5f7 0%, #ffffff 50%, #f5f5f7 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
  color: #1d1d1f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.glow {
  position: absolute; width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(239,68,68,0.1) 0%, transparent 70%);
  top: -200px; left: -200px; pointer-events: none;
}
.content {
  position: relative; z-index: 2;
  text-align: center; padding: 80px;
}
.badge {
  display: inline-block;
  background: linear-gradient(135deg, #ef4444, #f97316);
  color: white; font-size: 26px; font-weight: 800;
  padding: 10px 28px; border-radius: 100px;
  margin-bottom: 36px;
}
h1 {
  font-size: 84px; font-weight: 900;
  line-height: 1.05; margin-bottom: 24px;
  letter-spacing: -0.04em;
  background: linear-gradient(135deg, #1d1d1f 0%, #ef4444 50%, #f59e0b 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle {
  font-size: 38px; color: #86868b;
  font-weight: 500; margin-bottom: 60px;
}
.check-list {
  text-align: left; margin-bottom: 48px;
}
.check-item {
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 24px; font-size: 32px;
  color: #1d1d1f;
}
.check-icon {
  width: 48px; height: 48px; border-radius: 12px;
  background: rgba(52,199,89,0.15); color: #34c759;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0; font-weight: 700;
}
.score-circle {
  width: 260px; height: 260px; border-radius: 50%;
  background: conic-gradient(#34c759 270deg, #e5e5ea 0);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 32px; position: relative;
}
.score-circle::before {
  content: ''; position: absolute;
  width: 200px; height: 200px;
  background: #f5f5f7; border-radius: 50%;
}
.score-value {
  position: relative; font-size: 72px;
  font-weight: 900; color: #34c759;
}
.cta-box {
  background: linear-gradient(135deg, rgba(239,68,68,0.08), rgba(245,158,11,0.08));
  border: 2px solid rgba(239,68,68,0.2);
  border-radius: 28px; padding: 40px;
}
.cta-text {
  font-size: 36px; font-weight: 700;
  margin-bottom: 12px;
}
.url {
  font-size: 30px; color: #6366f1;
  font-weight: 700; font-family: 'SF Mono', monospace;
}
.footer {
  position: absolute; bottom: 60px;
  left: 0; right: 0; text-align: center; z-index: 2;
}
.footer-logo {
  font-size: 32px; font-weight: 800;
  background: linear-gradient(135deg, #ef4444, #f59e0b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="badge">🛡️ Gratuit</div>
    <h1>Security Audit<br>Pro Tool</h1>
    <p class="subtitle">20+ verificări în 30 secunde</p>
    <div class="check-list">
      <div class="check-item"><div class="check-icon">✓</div><span>DNSSEC & SSL Certificate</span></div>
      <div class="check-item"><div class="check-icon">✓</div><span>Email Spoofing Test</span></div>
      <div class="check-item"><div class="check-icon">✓</div><span>Subdomain Enumeration</span></div>
      <div class="check-item"><div class="check-icon">✓</div><span>Security Headers Analysis</span></div>
    </div>
    <div class="score-circle"><div class="score-value">85</div></div>
    <div class="cta-box">
      <div class="cta-text">🔗 Testează-ți site-ul acum</div>
      <div class="url">dragomirgeorge07-coder.github.io/esdum-demo</div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-logo">ESDUM IT CONSULTING</div>
  </div>
</body>
</html>
