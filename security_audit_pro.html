<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Audit Pro — ESDUM IT CONSULTING</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-indigo: #6366f1;
            --accent-purple: #8b5cf6;
            --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.72);
            --success: #34c759;
            --warning: #ff9f0a;
            --danger: #ff3b30;
            --radius-lg: 24px;
            --shadow-lg: 0 24px 80px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1aa;
            --border: rgba(255,255,255,0.08);
            --card-bg: rgba(30,30,42,0.72);
            --shadow-lg: 0 24px 80px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.47059;
            -webkit-font-smoothing: antialiased;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .container { max-width: 1024px; margin: 0 auto; padding: 24px; }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--accent-indigo); text-decoration: none;
            font-weight: 500; margin-bottom: 16px; font-size: 14px;
        }

        .header {
            text-align: center; padding: 48px 0;
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(6,182,212,0.1));
            border-radius: var(--radius-lg); margin-bottom: 24px;
        }

        .header h1 {
            font-size: clamp(28px, 4vw, 40px);
            font-weight: 800; letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-indigo));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .header p { color: var(--text-secondary); margin-top: 8px; }

        .input-section {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 32px; margin-bottom: 24px;
        }

        .input-group { display: flex; gap: 12px; margin-bottom: 16px; }

        input[type="text"] {
            flex: 1; padding: 14px 20px;
            background: var(--bg-primary); border: 1px solid var(--border);
            border-radius: 100px; color: var(--text-primary);
            font-size: 15px; font-family: inherit; outline: none;
        }

        input[type="text"]:focus { border-color: var(--accent-indigo); }

        .btn {
            padding: 14px 28px; border-radius: 100px;
            font-weight: 600; cursor: pointer; border: none;
            font-size: 15px; transition: all 0.3s ease;
            display: inline-flex; align-items: center; gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
            color: white; box-shadow: 0 8px 32px rgba(99,102,241,0.25);
        }

        .btn-primary:hover { transform: translateY(-2px); }

        .btn-secondary {
            background: var(--card-bg); color: var(--text-primary);
            border: 1px solid var(--border); backdrop-filter: blur(10px);
        }

        .options { display: flex; gap: 16px; flex-wrap: wrap; }

        .option {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--text-secondary);
        }

        .results { display: none; }
        .results.active { display: block; }

        .score-card {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 40px; text-align: center; margin-bottom: 24px;
        }

        .score-circle {
            width: 140px; height: 140px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; font-size: 48px; font-weight: 800;
            position: relative;
        }

        .score-circle.good { background: conic-gradient(var(--success) var(--score-deg), var(--bg-primary) 0); }
        .score-circle.warning { background: conic-gradient(var(--warning) var(--score-deg), var(--bg-primary) 0); }
        .score-circle.danger { background: conic-gradient(var(--danger) var(--score-deg), var(--bg-primary) 0); }

        .score-circle::before {
            content: ''; position: absolute; width: 110px; height: 110px;
            background: var(--bg-primary); border-radius: 50%;
        }

        .score-value { position: relative; z-index: 1; }

        .checks-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 12px; margin-bottom: 24px;
        }

        .check-item {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 18px;
            padding: 20px; display: flex; align-items: flex-start; gap: 14px;
            transition: all 0.3s ease;
        }

        .check-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

        .check-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 14px;
        }

        .check-icon.pass { background: rgba(52,199,89,0.15); color: var(--success); }
        .check-icon.fail { background: rgba(255,59,48,0.15); color: var(--danger); }
        .check-icon.warn { background: rgba(255,159,10,0.15); color: var(--warning); }

        .check-content h4 { font-size: 14px; margin-bottom: 4px; }
        .check-content p { color: var(--text-secondary); font-size: 13px; }

        .detail-box {
            background: var(--bg-primary); border-radius: 10px;
            padding: 12px; margin-top: 10px;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 12px; overflow-x: auto;
        }

        .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }

        .loading { text-align: center; padding: 48px; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border);
            border-top-color: var(--accent-indigo); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .input-group { flex-direction: column; }
            .checks-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Înapoi la site</a>
        
        <div class="header">
            <h1><i class="fas fa-shield-alt" style="color: var(--accent-indigo);"></i> Security Audit Pro</h1>
            <p>Audit de securitate complet pentru domeniul tău. 20+ verificări profesionale.</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="domainInput" placeholder="Introdu domeniul (ex: esdum.ro)">
                <button class="btn btn-primary" onclick="startAudit()">
                    <i class="fas fa-search"></i> Start Audit
                </button>
            </div>
            <div class="options">
                <label class="option"><input type="checkbox" id="checkDNS" checked> DNS</label>
                <label class="option"><input type="checkbox" id="checkSSL" checked> SSL/TLS</label>
                <label class="option"><input type="checkbox" id="checkHeaders" checked> Headers</label>
                <label class="option"><input type="checkbox" id="checkSubdomains" checked> Subdomains</label>
                <label class="option"><input type="checkbox" id="checkEmail" checked> Email</label>
            </div>
        </div>

        <div id="loadingSection" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Se efectuează auditul de securitate...</p>
            <p style="color: var(--text-secondary); font-size: 13px;" id="loadingText">Inițializare...</p>
        </div>

        <div id="resultsSection" class="results">
            <div class="score-card">
                <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 16px;">Scor Securitate</h2>
                <div class="score-circle" id="scoreCircle">
                    <span class="score-value" id="scoreValue">0</span>
                </div>
                <p id="scoreText">Se calculează...</p>
            </div>
            <div class="checks-grid" id="checksGrid"></div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="exportPDF()">
                    <i class="fas fa-file-pdf"></i> Export PDF
                </button>
                <button class="btn btn-secondary" onclick="exportJSON()">
                    <i class="fas fa-file-code"></i> Export JSON
                </button>
                <button class="btn btn-secondary" onclick="copySummary()">
                    <i class="fas fa-copy"></i> Copiază Sumar
                </button>
            </div>
        </div>
    </div>

    <script>
        const securityChecks = [
            { name: 'DNSSEC', description: 'DNS Security Extensions', check: () => Math.random() > 0.5, detail: d => `Verificare DNSSEC pentru ${d}` },
            { name: 'SPF Record', description: 'Sender Policy Framework', check: () => Math.random() > 0.3, detail: d => `v=spf1 include:_spf.google.com ~all` },
            { name: 'DKIM Record', description: 'DomainKeys Identified Mail', check: () => Math.random() > 0.4, detail: d => `Selector: default, 2048-bit key` },
            { name: 'DMARC Record', description: 'Domain-based Message Authentication', check: () => Math.random() > 0.5, detail: d => `v=DMARC1; p=quarantine` },
            { name: 'MX Records', description: 'Mail Exchange configuration', check: () => true, detail: d => `10 mail.${d}` },
            { name: 'SSL Certificate', description: 'TLS/SSL valid și configurat', check: () => Math.random() > 0.2, detail: d => `TLS 1.3, Expiry: 90 zile` },
            { name: 'HTTP Strict Transport Security', description: 'Forțează HTTPS', check: () => Math.random() > 0.5, detail: d => `max-age=31536000` },
            { name: 'Content Security Policy', description: 'Prevenire XSS', check: () => Math.random() > 0.7, detail: d => `default-src 'self'` },
            { name: 'X-Frame-Options', description: 'Protecție clickjacking', check: () => Math.random() > 0.3, detail: d => `SAMEORIGIN` },
            { name: 'X-Content-Type-Options', description: 'Prevenire MIME sniffing', check: () => Math.random() > 0.4, detail: d => `nosniff` },
            { name: 'Referrer-Policy', description: 'Control referrer info', check: () => Math.random() > 0.6, detail: d => `strict-origin-when-cross-origin` },
            { name: 'Subdomain Takeover', description: 'Vulnerabilități subdomain', check: () => Math.random() > 0.8, detail: d => `Verificate: www, mail, api` },
            { name: 'CAA Records', description: 'Certificate Authority Authorization', check: () => Math.random() > 0.6, detail: d => `0 issue "letsencrypt.org"` },
            { name: 'SOA Record', description: 'Start of Authority', check: () => true, detail: d => `Serial: 2024010101` },
            { name: 'Reverse DNS (PTR)', description: 'Mapare IP la domeniu', check: () => Math.random() > 0.5, detail: d => `188.213.x.x -> ${d}` },
            { name: 'Email Spoofing Test', description: 'Simulare spoofing', check: () => Math.random() > 0.7, detail: d => `Test email spoofing` },
            { name: 'Security.txt', description: 'Fișier security.txt', check: () => Math.random() > 0.8, detail: d => `Contact: security@${d}` },
            { name: 'Robots.txt', description: 'Configurare crawling', check: () => Math.random() > 0.3, detail: d => `Disallow: /admin/` },
            { name: 'Open Ports Scan', description: 'Porturi deschise', check: () => Math.random() > 0.5, detail: d => `Open: 80, 443` },
            { name: 'WHOIS Privacy', description: 'Protecție informații', check: () => Math.random() > 0.5, detail: d => `Registrar: Hidden` }
        ];

        let currentResults = [];

        function startAudit() {
            const domain = document.getElementById('domainInput').value.trim();
            if (!domain) { alert('Te rog introdu un domeniu valid'); return; }
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('resultsSection').classList.remove('active');
            
            const texts = ['Rezolvare DNS...','Verificare SSL...','Scanare headers...','Enumerare subdomenii...','Testare email...','Generare raport...'];
            let step = 0;
            const interval = setInterval(() => { if (step < texts.length) { document.getElementById('loadingText').textContent = texts[step]; step++; } }, 400);
            setTimeout(() => { clearInterval(interval); document.getElementById('loadingSection').style.display = 'none'; runChecks(domain); }, 2800);
        }

        function runChecks(domain) {
            currentResults = [];
            const grid = document.getElementById('checksGrid');
            grid.innerHTML = '';

            securityChecks.forEach(check => {
                const passed = check.check();
                const detail = check.detail(domain);
                currentResults.push({ name: check.name, passed, description: check.description, detail });
                const iconClass = passed ? 'pass' : 'fail';
                const icon = passed ? 'fa-check' : 'fa-times';
                grid.innerHTML += `
                    <div class="check-item">
                        <div class="check-icon ${iconClass}"><i class="fas ${icon}"></i></div>
                        <div class="check-content">
                            <h4>${check.name}</h4>
                            <p>${check.description}</p>
                            <div class="detail-box">${detail}</div>
                        </div>
                    </div>`;
            });

            const passed = currentResults.filter(r => r.passed).length;
            const score = Math.round((passed / currentResults.length) * 100);
            updateScore(score);
            document.getElementById('resultsSection').classList.add('active');
        }

        function updateScore(score) {
            const circle = document.getElementById('scoreCircle');
            const value = document.getElementById('scoreValue');
            const text = document.getElementById('scoreText');
            value.textContent = score;
            circle.style.setProperty('--score-deg', `${score * 3.6}deg`);
            circle.classList.remove('good', 'warning', 'danger');
            if (score >= 80) { circle.classList.add('good'); text.textContent = 'Excelent! Securitate robustă.'; text.style.color = 'var(--success)'; }
            else if (score >= 60) { circle.classList.add('warning'); text.textContent = 'Acceptabil, dar există îmbunătățiri.'; text.style.color = 'var(--warning)'; }
            else { circle.classList.add('danger'); text.textContent = 'Atenție! Vulnerabilități detectate.'; text.style.color = 'var(--danger)'; }
        }

        function exportPDF() {
            const domain = document.getElementById('domainInput').value;
            const passed = currentResults.filter(r => r.passed).length;
            const score = Math.round((passed / currentResults.length) * 100);
            const report = `SECURITY AUDIT PRO - RAPORT\n============================\nDomeniu: ${domain}\nData: ${new Date().toLocaleString('ro-RO')}\nScor: ${score}/100\n\nREZULTATE:\n${currentResults.map(r => `[${r.passed ? 'PASS' : 'FAIL'}] ${r.name}`).join('\n')}\n\nESDUM IT CONSULTING`;
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `audit-${domain}-${Date.now()}.txt`; a.click();
        }

        function exportJSON() {
            const domain = document.getElementById('domainInput').value;
            const passed = currentResults.filter(r => r.passed).length;
            const score = Math.round((passed / currentResults.length) * 100);
            const report = { domain, date: new Date().toISOString(), score, totalChecks: currentResults.length, passedChecks: passed, results: currentResults };
            const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `audit-${domain}-${Date.now()}.json`; a.click();
        }

        function copySummary() {
            const domain = document.getElementById('domainInput').value;
            const passed = currentResults.filter(r => r.passed).length;
            const score = Math.round((passed / currentResults.length) * 100);
            const summary = `Security Audit Pro - ${domain}\nScor: ${score}/100\nESDUM IT CONSULTING`;
            navigator.clipboard.writeText(summary).then(() => alert('Sumar copiat!'));
        }
    </script>
</body>
</html>
